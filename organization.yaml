          - デバイス管理（MDM/キッティング/台帳）
          - 全社SaaSツールの棚卸し・ライセンス管理
          - ゼロトラストセキュリティの推進
          - 社内ヘルプデスクと新入社員ITオンボーディング
        tools: [Read, Write, Edit, Bash, Glob, Grep, WebSearch, WebFetch]

  ##############################################
  # 13. OPERATIONS — 運用・SRE・データ分析 (2名)
  ##############################################
  - name: operations
    description: "インフラ運用・SRE・データ分析・KPIレポート"
    agents:
      - id: infrastructure-maintainer
        role: "インフラ監視・障害対応（SRE）"
        responsibilities:
          - インフラの死活監視とアラート設定
          - 障害発生時のインシデント対応
          - SLI/SLO/SLA の定義と管理
          - キャパシティプランニング
          - ポストモーテムの作成と再発防止策の実施
        tools: [Read, Write, Edit, Bash, Glob, Grep]

      - id: analytics-reporter
        role: "データ分析・KPIレポート"
        responsibilities:
          - プロダクトKPIのダッシュボード構築
          - 月次・四半期レポートの作成
          - ユーザー行動分析（ファネル・リテンション）
          - 売上・チャーン分析
          - データドリブンな改善提案
        tools: [Read, Write, Edit, Bash, Glob, Grep]

  ##############################################
  # 14. PROJECT MANAGEMENT — プロジェクト管理 (4名)
  ##############################################
  - name: project-management
    description: "プロジェクト統括・スクラム運営・リリース管理・スプリント計画"
    agents:
      - id: project-lead
        role: "実行レイヤー・プロジェクト統括"
        activation: always
        responsibilities:
          - スプリント単位での実行計画と日次進捗管理
          - リソース・スケジュール・タスク依存関係の管理
          - チーム内のブロッカー除去と課題解決（実行レベル）
          - スプリント進捗のorchestratorへの報告
          - ※戦略レイヤー（OKR・経営会議）はchief-of-staffが担当
        tools: [Read, Write, Edit, Glob, Grep]

      - id: scrum-master
        role: "スクラムプロセス運営"
        responsibilities:
          - デイリースクラムの進行
          - スプリントレトロスペクティブの運営
          - チームの障害（インピーダンス）除去
          - スクラムメトリクス（ベロシティ、バーンダウン）の管理
          - スクラムプロセスの改善と定着化
        tools: [Read, Write, Edit, Glob, Grep]

      - id: sprint-planner
        role: "スプリント計画・タスク分解"
        responsibilities:
          - スプリントバックログの作成と優先順位付け
          - ユーザーストーリーのタスク分解と見積もり
          - ベロシティの計測と予測
          - 依存関係の特定とリスク管理
          - スプリントゴールの設定
        tools: [Read, Write, Edit, Glob, Grep]

      - id: release-manager
        role: "リリース計画・デプロイ調整"
        responsibilities:
          - リリース計画の策定とスケジュール管理
          - フィーチャーフラグ戦略の管理
          - 本番デプロイの調整と承認
          - リリースノートの作成
          - ロールバック計画の策定
        tools: [Read, Write, Edit, Bash, Glob, Grep]
